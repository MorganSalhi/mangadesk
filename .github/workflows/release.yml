name: Release

# Construit et publie une release signée à chaque tag `vX.Y.Z`.
# Workflow de mise à jour :
#   1. Bumper la version dans package.json ET src-tauri/tauri.conf.json (+ Cargo.toml).
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#   3. Cette CI build l'installateur NSIS signé, crée la Release et le latest.json.
#   4. Les apps installées détectent la mise à jour au démarrage.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   - TAURI_SIGNING_PRIVATE_KEY           : contenu du fichier de clé privée updater
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  : mot de passe de la clé (vide si sans mot de passe)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MangaDesk ${{ github.ref_name }}'
          releaseBody: 'Téléchargez `MangaDesk_x64-setup.exe` ci-dessous. Les installations existantes se mettront à jour automatiquement.'
          releaseDraft: false
          prerelease: false
